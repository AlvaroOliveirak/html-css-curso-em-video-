<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESAFIO 06</title>
</head>
<body>
    <H1>Tags em HTML</H1>
    <p>Em HTML, podemos inserir, entre outros, os elementos da lista a seguir.<br> para ver qual tag utilizar para adicioná-los, pouse o mouse sobre eles:</p>
    <ul>
        <li title="Use a Tag: &lt;p&gt;">Parágrafos;</li>
        <li title="Use a Tag: &lt;br&gt;">Quebra de Linha;</li>
        <li title="Use a Tag: &lt;link&gt;">Links;</li>
        <li title="Use a Tag: &lt;abbr&gt;">Abreviações;</li>
        <li title="Use a Tag: &lt;h1&gt; até &lt;h6&gt;">Títulos;</li>
        <li title="Use a Tag: &lt;code&gt;">Código-Fonte;</li>
        <li title="Use a Tag: &lt;ol&gt;">Lista Ordenada;</li>
        <li title="Use a Tag: &lt;ul&gt;">Lista não Ordenada;</li>
    </ul>
</body>
</html>
