<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr>
    <p>blablablablablablablablablablablablablablablblablablabla</p>
    <p>para quebrar um texto, pode-se usar a tag &lt;Br&gt;. <br>veja só</p>
    <p>vamos adicionar alguns simbolos especiais: &reg; &copy; &trade;
        &cent; &Delta; &TRADE;</p>
        <p>vamos adicionar alguns emojis:
            👌ou &#x1F49E;<!-- pode ser tanto direto, quanto copiando o código hexadecimal-->
        </p>
</body>
</html>
