<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste com imagens</title>
</head>
<body>
    <h1>testando carga e imagens</h1>
    <p>aqui você vera uma imagem que esta na mesma pasta</p>
   <img src="logo html- 200l.png" alt="logo html5"> 
   <!-- <IMG> permite a implementação de imagens através do atributo SRC. o atributo ALT mostra uma mensagem caso a imagem não seja carregada-->

   <p>podemos também carregar imagens que estão em subpastas</p>
   <img src="imagens/css3 logo- 200.png" alt="logo css3">
   <!-- para imagens que não estão na mesma pasta, devemos explicitar o caminho do arquivo na pasta-->

   <p>também podemos carregar imagens externas</p>
<!--atráves da url-->
   <img src="https://itexto.com.br/wp-content/uploads/2017/08/logotipo.png" alt="logo javascrpit">
   <!-- para usar imagens de outros sites, é só usar o link delas-->
</body>
</html>
