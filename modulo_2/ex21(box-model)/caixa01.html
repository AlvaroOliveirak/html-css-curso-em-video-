<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{
            background-color: lightblue;
            height:300px;
            width: 300px;
            border-width: 5px;
            border-style: solid;
            border-color: brown;
            padding: 10px;
            margin: 10px;
        }
        a{
            border-width: 10px;
            border-style: groove;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>paragráfos são exemplos de box-level, mas os <a href="#">Links são exemplos de caixa inline-level</a> vamos ver como tudo isso funciona
    </p>
    
</body>
</html>
