<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        table{
            width: 800px;
            height: 400px;
            border-collapse: collapse ;
        }
        th,td{
            border: 1px solid black;
        }
        .head{
            background-color: rgba(5, 60, 85, 0.719);
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" class="head">Área</th>
                <th rowspan="2" scope="row" class="head">Disciplinas</th>
                <th colspan="2" scope="colgroup" class="head">Notas</th>
                <th rowspan="2" scope="col" class="head">Média</th>
            </tr>
            <tr>
                <th scope="col" class="head">Nota 1</th>
                <th scope="col" class="head">Nota 2</th>
            </tr>
            </thead>
           <tbody>
               
               <tr>
                   <th rowspan="4" scope="rowgroup">Exatas</th>
                   <td>Matemática</td>
                   <td>0.0</td>
                   <td>0.0</td>
                   <td>0.0</td>
               </tr>
               <tr>
                   <td>Física</td>
                   <td>0.0</td>
                   <td>0.0</td>
                   <td>0.0</td>
               </tr>
               <tr>
                   <td>Química</td>
                   <td>0.0</td>
                   <td>0.0</td>
                   <td>0.0</td>
               </tr>
               <tr>
                   <td>Biologia</td>
                   <td>0.0</td>
                   <td>0.0</td>
                   <td>0.0</td>
               </tr>
               <tr>
                   <th colspan="4" scope="row" class="head">Média de Exatas</th>
                   <td>0.0</td>
               </tr>
               <tr>
                   <th rowspan="2" scope="rowgroup">Humanas</th>
                   <td>História</td>
                   <td>0.0</td>
                   <td>0.0</td>
                   <td>0.0</td>
               </tr>
               <tr>
                   <td>Geografia</td>
                   <td>0.0</td>
                   <td>0.0</td>
                   <td>0.0</td>
               </tr>
               <tr>
                   <th colspan="4" scope="row" class="head">Média de Humanas</th>
                   <td>0.0</td>
               </tr>
           </tbody>
    </table>
    
</body>
</html>
