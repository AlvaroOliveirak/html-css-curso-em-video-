<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="inome">Nome:</label>
            <input type="text" name="nome" id="inome" required minlength="5" maxlength="40" size="20" placeholder="Nome completo" autocomplete="name">
        </p>
        <p>
            <label for="imedia">Média:</label>
            <input type="number" name="media" id="imedia" required  min="0" max="10" step="0.1" placeholder="digite a média" autocomplete="off">
        </p>
        <p><label for="imes">Periodo letivo</label></p>
        <input type="month" name="mes" id="imes" required autocomplete="off" value="2026-06">
        <p>
            <label for="idia">Dia da prova:</label>
            <input type="date" name="dia" id="idia" required autocomplete="off">
        </p>
        <p>
            <label for="ihora">Hora da prova:</label>
            <input type="time" name="hora" id="ihora" required autocomplete="off">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
</body>
</html>
