<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Teste</title>
    <style>
        body{
            font-family: Georgia, 'Times New Roman', Times, serif;
            background-color: slategrey;
            color: antiquewhite;
        }
        table{
            width: 600px;
            height: 400px;
            text-align: center;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            border-collapse: collapse;
        }
        th,td{
            border: 1px solid black;
        }
        col.v{
            background-color: maroon;
        }
        col.b{
            background-color: rgb(2, 2, 121);
        }
    </style>
</head>
<body>
    <h1>isso é um teste</h1>
    <table>
        <caption>Cadastro</caption>
        <colgroup>
            <col class="v">
            <col class="b">
            <col class="v">
            <col class="b">
        </colgroup>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <TD>25</TD>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Cláudio</td>
            <td>M</td>
            <td>28</td>
            <td>Programador</td>
        </tr>
        <tr>
            <td>Hélio</td>
            <td>M</td>
            <td>19</td>
            <td>Professor</td>
        </tr>
        <tr>
            <td>Mária</td>
            <td>F</td>
            <td>39</td>
            <td>Médica</td>
        </tr>
        <tr>
            <td>Otávio</td>
            <td>M</td>
            <td>22</td>
            <td>Nutricionista</td>
        </tr>
    </table>
    
    
</body>
</html>
